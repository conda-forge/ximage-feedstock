{% set name = "ximage" %}
{% set version = "0.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ximage-{{ version }}.tar.gz
  sha256: bbdea31b16f6906c37f3412c957f79e5f4c2ce01e6b8246b6ce7c8c87908a0fd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - xarray
    - dask-core
    - dask-image
    - matplotlib-base
    - scikit-image

test:
  imports:
    - ximage
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ghiggi/ximage
  summary: xarray-based tools for image/video processing
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ghiggi
